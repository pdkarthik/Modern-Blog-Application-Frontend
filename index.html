<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#F97316" />
    <meta name="color-scheme" content="light dark" />
    
    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <title>CA Monk Blog</title>
    <meta name="description" content="CA Monk Blog Application - Read and create insightful blog posts" />
    <meta name="author" content="CA Monk" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://camonk.blog/" />
    <meta property="og:title" content="CA Monk Blog" />
    <meta property="og:description" content="Read and create insightful blog posts" />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:site_name" content="CA Monk Blog" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://camonk.blog/" />
    <meta name="twitter:title" content="CA Monk Blog" />
    <meta name="twitter:description" content="Read and create insightful blog posts" />
    <meta name="twitter:image" content="/og-image.png" />
    <meta name="twitter:site" content="@CAMonk" />
    <meta name="twitter:creator" content="@CAMonk" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
